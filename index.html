<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Basic Meta Tags -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Art Gallery</title>
  <meta name="description" content="Explore my collection of artworks including collages, panels, and covers.">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>My Art Gallery</h1>
    <p>Explore my collection of artworks</p>
  </header>

  <!-- Filters -->
  <div class="filters">
    <select id="yearFilter">
      <option value="">Filter by Year</option>
    </select>

    <!-- Multi-selects: options are populated by script.js -->
    <div style="display:flex; flex-direction:column; gap:6px;">
      <select id="categoryFilter" multiple size="6" aria-label="Filter by Category (multi-select)"></select>
      <select id="seriesFilter" multiple size="6" aria-label="Filter by Series (multi-select)"></select>
      <small style="opacity:.8;">Tip: hold Ctrl (Windows) or Cmd (Mac) to select multiple.</small>
    </div>

    <button id="clearFiltersBtn" type="button">Clear filters</button>
  </div>

  <!-- Gallery -->
  <div class="gallery"></div>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" src="" alt="Full View">
  </div>

  <footer>
    <p>© 2025 My Art Gallery — Hosted on GitHub Pages</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
