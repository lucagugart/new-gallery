<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Basic Meta Tags -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Art Gallery v0.13</title>
  <meta name="description" content="Explore my collection of artworks including collages, panels, and covers.">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

  <!-- CSS -->

  <link rel="stylesheet" href="style.css?v=0.13">
  <script src="script.js?v=0.13"></script>

</head>
<body>

  <header>
    <h1>
      My Art Gallery <v0 class="13"></v0>
     <span class="version">v0.13</span>
    </h1>
    <p>Explore my collection of artworks</p>
  </header>

<!-- Filters -->
<div class="filters-wrapper">
  <div class="filters">
    <select id="yearFilter">
      <option value="">Year</option>
    </select>

    <select id="categoryFilter">
      <option value="">Category</option>
    </select>

    <select id="seriesFilter">
      <option value="">Series</option>
    </select>

    <button id="clearFiltersBtn" type="button">Clear</button>
  </div>
</div>



  <!-- Gallery -->
  <div class="gallery"></div>


<!-- Lightbox -->
<div id="lightbox" class="lightbox" aria-hidden="true">
  <button class="lightbox-close" type="button" aria-label="Close" onclick="closeLightbox()">×</button>

  <button id="lightbox-prev" class="lightbox-nav prev" type="button" aria-label="Previous image">‹</button>

  <div class="lightbox-content" role="dialog" aria-modal="true">
    <img id="lightbox-img" src="" alt="Full View">
    <div id="lightbox-caption" class="lightbox-caption"></div>
    <div id="lightbox-counter" class="lightbox-counter"></div>

    <div id="lightbox-thumbs" class="lightbox-thumbs" aria-label="Thumbnails"></div>
  </div>

  <button id="lightbox-next" class="lightbox-nav next" type="button" aria-label="Next image">›</button>
</div>



<footer>
  <p>© 2025 My Art Gallery · v0.12 · Hosted on GitHub Pages</p>
</footer>

</body>
</html>
