<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Basic Meta Tags -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Art Gallery v0.10</title>
  <meta name="description" content="Explore my collection of artworks including collages, panels, and covers.  Version 0.4">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

  <!-- CSS -->

  <link rel="stylesheet" href="style.css?v=0.10">
  <script src="script.js?v=0.10"></script>

</head>
<body>

  <header>
    <h1>
      My Art Gallery v0.10
     <span class="version">v0.10</span>
    </h1>
    <p>Explore my collection of artworks</p>
  </header>

<!-- Filters -->
<div class="filters-wrapper">
  <div class="filters">
    <select id="yearFilter">
      <option value="">Year</option>
    </select>

    <select id="categoryFilter">
      <option value="">Category</option>
    </select>

    <select id="seriesFilter">
      <option value="">Series</option>
    </select>

    <button id="clearFiltersBtn" type="button">Clear</button>
  </div>
</div>



  <!-- Gallery -->
  <div class="gallery"></div>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" src="" alt="Full View">
  </div>


<footer>
  <p>© 2025 My Art Gallery · v0.10 · Hosted on GitHub Pages</p>
</footer>

</body>
</html>
